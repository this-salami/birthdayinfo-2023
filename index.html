<!DOCTYPE html>
<html lang="en">  
  <head>
    <link rel="stylesheet" href="index.css">
  </head>
  <body class="" data-is-submited="false">
    <div id="themes">
      <div id="light"></div>
      <div id="dark"></div>
      <div id="brown"></div>
    </div>
    <h1 id="title">Birthday Info</h1>
    <input id="dateIn" type="date">
    <input id="submit" type="button" value="Continue">
    
    <div id="info">
      <h1 id="infoTitle">mm/dd/yyyy</h1>
      <p id="X">X</p>
      
      <div id="cards">
        <div style="animation-delay: 0.7s" id="horoscope">
          <h2>Horoscope</h2>
          <h3 id="horoscopeTitle">name</h3>
          <img draggable="false" ondragstart="return false;" id="horoscopeImg" src="">
          
        </div>
        <div style="animation-delay: 0.9s" id="chineseZodiac">
          <h2>Chinese Zodiac</h2>
          <h3 id="chineseZodiacTitle">name</h3>
          <img draggable="false" ondragstart="return false;" id="chineseZodiacImg" src="">
          
        </div>
        <div style="animation-delay: 1.1s" id="birthstone">
          <h2>Birthstone</h2>
          <!-- <h3 id="stoneTitle">name</h3> -->
          <div class="rotateOuter"></div>
        </div>
        <div style="animation-delay: 1.3s" id="flower">
          <h2>Flower</h2>
          <div class="rotateOuter"></div>
          
        </div>
        <div style="animation-delay: 1.5s" id="colorology">
          <h2>Colorology</h2>
          
        </div>
        <div style="animation-delay: 1.7s" id="exploreOtherDates">
          
        </div>
      </div> 
    </div>

    <script src="index.js"></script>
  </body>
</html>
